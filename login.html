<!DOCTYPE html>
<html lang="en" >
<head>
  <meta charset="UTF-8">
  <title>USER-LOGIN</title>
  <link rel='stylesheet' href='https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.14.0/css/all.min.css'><link rel="stylesheet" href="./style.css">

</head>
<body>
<!-- partial:index.partial.html -->

<div class="container" id="container">
	<div class="form-container sign-up-container">
		<form action="controller/auth.php" method="post" >
			<h1>Create Account</h1>
			
			<input type="text" placeholder="Name" name="name" required/>
			<input type="email" placeholder="Email" name="email" required pattern="[a-zA-Z0-9._%+-]+@[a-zA-Z0-9.-]+\.com" title="Please enter a valid email address ending with .com"/>
			<input type="number" placeholder="Number" name="num" required/>
			<input type="text" placeholder="Address" name="add" required/>
			<input type="password" placeholder="Password" name="pass" required pattern="(?=.*\d)(?=.*[a-z])(?=.*[A-Z]).{8,}" title="Must contain at least one number, one uppercase letter, one lowercase letter, and at least 8 or more characters"/>
			<button type="submit" name="reg">Sign Up</button>
		</form>
	</div>
	<div class="form-container sign-in-container">
		<form action="controller/auth.php" method="post">
			<h1>LOGIN</h1>
		
			<input type="email" placeholder="Email" name="email" required/>
			<input type="password" placeholder="Password" name="pass" required/>
			<button type="submit" name="login">Login</button>
		</form>
	</div>
	<div class="overlay-container">
		<div class="overlay">
			<div class="overlay-panel overlay-left">
				<h1>Welcome Back!</h1>
				<p>To keep connected with us please login with your personal info</p>
				<button class="ghost" id="signIn">Log In</button>
			</div>
			<div class="overlay-panel overlay-right">
				<h1>Hello, Friend!</h1>
				<p>Enter your personal details and start journey with us</p>
				<button class="ghost" id="signUp">Sign Up</button>
			</div>
		</div>
	</div>
</div>

<!-- partial -->
  <script  src="./script.js"></script>

</body>
</html>
